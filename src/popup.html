<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Markdown Downloader</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header class="app-header">
        <img src="../icons/icon32.png" width="32" height="32" alt="">
        <div>
          <h1>Markdown Downloader</h1>
          <p id="status" role="status" aria-live="polite">Checking current tab...</p>
        </div>
      </header>

      <section class="target" aria-label="Selected page">
        <div class="target__topline">
          <span id="target-kind" class="target__kind">Not ready</span>
          <span id="target-host" class="target__host"></span>
        </div>
        <p id="target-title" class="target__title">No supported page selected</p>
      </section>

      <button id="download" type="button" disabled>Download Markdown</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
