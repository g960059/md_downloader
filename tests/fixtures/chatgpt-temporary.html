<!doctype html>
<html lang="ja-JP">
  <head>
    <meta charset="utf-8">
    <title>ChatGPT</title>
  </head>
  <body>
    <main id="main">
      <div data-testid="conversation-turn-1" data-turn="user">
        <div data-message-author-role="user">
temporary chatでも、この内容をMarkdownとして欠落なく保存したいです。
        </div>
      </div>
      <article data-testid="conversation-turn-2" data-turn="assistant">
        <div data-message-author-role="assistant">
          <div class="markdown prose">
            <p>Temporary chat は保存済み会話IDがないため、表示中の会話DOMから抽出します。</p>
            <ol>
              <li>ユーザー発話を保存します。</li>
              <li>アシスタント発話も保存します。</li>
            </ol>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
